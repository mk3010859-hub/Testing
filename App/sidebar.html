<style>
.sidebar{width:220px;background:#0b2a4a;color:#fff;padding:20px 0;flex-shrink:0;display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto}
.sidebar .logo{padding:0 20px 20px;font-size:1.2rem;font-weight:700;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar .logo i{color:#7bc5f5}
.sidebar .logo small{font-size:.6rem;background:#1a5cff;padding:2px 6px;border-radius:10px;margin-left:5px;font-weight:normal}
.sidebar .nav{padding:10px 0;flex-grow:1}
.sidebar .nav a{display:flex;align-items:center;gap:12px;padding:12px 20px;color:rgba(255,255,255,.7);text-decoration:none;font-size:.85rem;transition:.2s;border-left:4px solid transparent}
.sidebar .nav a:hover{background:rgba(255,255,255,.05);color:#fff}
.sidebar .nav a.active{background:rgba(255,255,255,.1);color:#fff;border-left-color:#7bc5f5}
.sidebar .nav a i{width:20px;text-align:center;font-size:.95rem}
.sidebar .folder-info{margin:10px 15px;padding:10px;background:rgba(255,255,255,.05);border-radius:6px;cursor:pointer;transition:.2s;border:1px dashed rgba(255,255,255,.1)}
.sidebar .folder-info:hover{background:rgba(255,255,255,.1);border-color:#7bc5f5}
.sidebar .folder-info i{color:#f5b041;font-size:1.1rem;float:left;margin-right:10px;margin-top:2px}
.sidebar .folder-info span{display:block;font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar .folder-info .sub{font-size:.65rem;color:#7a8fa5;font-weight:normal;margin-top:2px}
.sidebar .user{padding:15px 20px;border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:12px}
.sidebar .user .name{font-size:.8rem;font-weight:600}

/* Nav Group styles for sub menus */
.nav-group{display:block}
.nav-group-header{display:flex;align-items:center;gap:12px;padding:12px 20px;color:rgba(255,255,255,.7);text-decoration:none;font-size:.85rem;cursor:pointer;transition:.2s;border-left:4px solid transparent}
.nav-group-header:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-group-header.active{background:rgba(255,255,255,.08);color:#fff;border-left-color:#7bc5f5}
.nav-sub{padding-left:20px;max-height:0;overflow:hidden;transition:max-height .3s ease}
.nav-sub.open{max-height:300px}
.nav-sub a{display:flex;align-items:center;gap:12px;padding:8px 20px;color:rgba(255,255,255,.6);text-decoration:none;font-size:.78rem;transition:.2s;border-left:3px solid transparent}
.nav-sub a:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-sub a.active{background:rgba(255,255,255,.08);color:#fff;border-left-color:#7bc5f5}
.nav-sub a i{width:20px;text-align:center;font-size:.7rem}
</style>

<script>
function toggleSubMenu(id) {
    const sub = document.getElementById(id);
    const arrow = document.getElementById(id + 'Arrow');
    if (!sub) return;
    sub.classList.toggle('open');
    if (arrow) {
        arrow.style.transform = sub.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
    }
}

// Auto-open Finance submenu if any child is active
document.addEventListener('DOMContentLoaded', function() {
    const financeSub = document.getElementById('financeSub');
    if (financeSub) {
        const hasActive = financeSub.querySelector('a.active');
        if (hasActive) {
            financeSub.classList.add('open');
            const arrow = document.getElementById('financeArrow');
            if (arrow) arrow.style.transform = 'rotate(180deg)';
        }
    }
});
</script>
