<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>sidebar</title></head><body>
<div class="sidebar">
<!-- Keep your existing HTML here; only remove class="active" from Master link -->
</div>

<script>
function toggleSubMenu(id){
    const sub=document.getElementById(id);
    const arrow=document.getElementById("financeArrow");
    if(!sub) return;
    sub.classList.toggle("open");
    if(arrow){
        arrow.style.transform=sub.classList.contains("open")
            ?"rotate(180deg)":"rotate(0deg)";
    }
}

function setActiveMenu(clickedLink){
    document.querySelectorAll(".sidebar a").forEach(a=>a.classList.remove("active"));
    document.querySelectorAll(".nav-group-header").forEach(h=>h.classList.remove("active"));

    clickedLink.classList.add("active");

    const financeSub=document.getElementById("financeSub");
    const financeHeader=document.querySelector(".nav-group-header");
    const financeArrow=document.getElementById("financeArrow");

    if(financeSub && financeSub.contains(clickedLink)){
        financeSub.classList.add("open");
        if(financeHeader) financeHeader.classList.add("active");
        if(financeArrow) financeArrow.style.transform="rotate(180deg)";
    }else{
        if(financeSub) financeSub.classList.remove("open");
        if(financeArrow) financeArrow.style.transform="rotate(0deg)";
    }
}

document.addEventListener("DOMContentLoaded",()=>{
    document.querySelectorAll(".sidebar a").forEach(link=>{
        const oldClick=link.getAttribute("onclick");
        link.onclick=function(){
            setActiveMenu(this);
            if(oldClick){ new Function(oldClick).call(this); }
        };
    });
});
</script>
</body></html>
